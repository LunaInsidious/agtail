<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="agtail">
  <!-- Vector form of the ≋ brand mark (three stacked tildes = a "tailed" stream),
       drawn as paths so it renders identically regardless of available fonts. -->
  <rect width="32" height="32" rx="7" fill="#11151f" />
  <g fill="none" stroke="#e0a458" stroke-width="2.4" stroke-linecap="round">
    <path d="M6 11 q3.33 -3 6.67 0 t6.67 0 t6.67 0" />
    <path d="M6 16 q3.33 -3 6.67 0 t6.67 0 t6.67 0" />
    <path d="M6 21 q3.33 -3 6.67 0 t6.67 0 t6.67 0" />
  </g>
</svg>
