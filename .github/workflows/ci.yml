name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · format · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # corepack provides pnpm from the packageManager field — no third-party action.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Install the Chrome channel the Playwright config targets (channel: "chrome").
      - run: pnpm exec playwright install --with-deps chrome
      - run: pnpm test:e2e
