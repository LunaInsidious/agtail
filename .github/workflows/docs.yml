name: Docs

# Build the VitePress site (docs/) and publish it to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". Site is served at https://<owner>.github.io/agtail/ (base
# is set in docs/.vitepress/config.ts).
on:
  push:
    branches: [main]
    # Only rebuild when the docs (or this workflow) change.
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Default to read-only; the write scopes Pages needs are granted to the deploy
# job alone (the build job only checks out and uploads an artifact).
permissions:
  contents: read

# Let one Pages deploy finish rather than cancelling it; queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # corepack provides pnpm from the root packageManager field — no third-party action.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/configure-pages@v5
      # docs/ is its own pnpm project with its own committed lockfile.
      # --ignore-scripts: VitePress needs no package lifecycle scripts, so block
      # transitive postinstall scripts from running in CI (supply-chain hardening).
      - name: Install & build docs
        working-directory: docs
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy step needs to mint an OIDC token and write to Pages.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
