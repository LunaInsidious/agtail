name: Docs

# Build the VitePress docs (docs/) AND the server-less playground (dist-playground)
# and publish both to GitHub Pages: docs at /agtail/, playground at /agtail/playground/.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". (bases are set in docs/.vitepress/config.ts and
# vite.config.playground.ts.)
on:
  push:
    branches: [main]
    # Rebuild when the docs or the playground (app/core sources) change.
    paths:
      - "docs/**"
      - "src/**"
      - "vite.config.playground.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Default to read-only; the write scopes Pages needs are granted to the deploy
# job alone (the build job only checks out and uploads an artifact).
permissions:
  contents: read

# Let one Pages deploy finish rather than cancelling it; queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # corepack provides pnpm from the root packageManager field — no third-party action.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/configure-pages@v5
      # The playground builds from the root project (Vite + React), so it needs
      # the root deps installed.
      - name: Build playground
        run: |
          pnpm install --frozen-lockfile
          pnpm build:playground
      # docs/ is its own pnpm project with its own committed lockfile.
      # --ignore-scripts: VitePress needs no package lifecycle scripts, so block
      # transitive postinstall scripts from running in CI (supply-chain hardening).
      - name: Build docs
        working-directory: docs
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm build
      # Nest the playground under the docs site at /playground/ (its index file
      # is named index.playground.html, so rename it to index.html).
      - name: Assemble site
        run: |
          mkdir -p docs/.vitepress/dist/playground
          cp -R dist-playground/. docs/.vitepress/dist/playground/
          mv docs/.vitepress/dist/playground/index.playground.html docs/.vitepress/dist/playground/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy step needs to mint an OIDC token and write to Pages.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
